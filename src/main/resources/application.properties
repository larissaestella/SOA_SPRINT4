spring.application.name=map-api

# ------------------------------------------
# Banco de dados H2
# ------------------------------------------
spring.datasource.url=jdbc:h2:mem:mapdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------------------------------------------
# JPA / Hibernate
# ------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------
# Flyway
# ------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ------------------------------------------
# Swagger / OpenAPI
# ------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ------------------------------------------
# Security / JWT
# ------------------------------------------
# Secret em Base64 (minimo 256 bits para HS256)
security.jwt.secret=bWFwLWFwaS1zZWNyZXQta2V5LWZpYXAtY2FyZXBsdXMtc29hLTIwMjQ=
security.jwt.expiration-ms=86400000

# ------------------------------------------
# Server
# ------------------------------------------
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
